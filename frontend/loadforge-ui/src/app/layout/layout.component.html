<div class="app-layout">
  <!-- Toolbar -->
  <mat-toolbar color="primary" class="app-toolbar">
    <button mat-icon-button (click)="toggleSidenav()">
      <mat-icon>menu</mat-icon>
    </button>

    <div class="logo">
      <mat-icon>speed</mat-icon>
      <span>LoadForge</span>
    </div>

    <span class="spacer"></span>

    <button mat-icon-button matTooltip="Notifications">
      <mat-icon matBadge="3" matBadgeColor="warn" matBadgeSize="small">notifications</mat-icon>
    </button>

    <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
      <div class="user-avatar">{{ getUserInitials() }}</div>
      <span class="user-name">{{ currentUser?.firstName }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <div class="user-info" mat-menu-item disabled>
        <strong>{{ currentUser?.firstName }} {{ currentUser?.lastName }}</strong>
        <br>
        <small>{{ currentUser?.email }}</small>
        <br>
        <mat-chip>{{ currentUser?.role }}</mat-chip>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <!-- Sidenav + Content -->
  <mat-sidenav-container class="app-sidenav-container">
    <mat-sidenav [mode]="'side'" [opened]="isSidenavOpen" class="app-sidenav">
      <mat-nav-list>
        <a mat-list-item *ngFor="let item of navItems"
           [routerLink]="item.route"
           routerLinkActive="active-link"
           class="nav-item">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="app-content">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
